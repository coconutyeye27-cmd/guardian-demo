<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>成长守护AI助手 - 场景化方案Demo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: '#4CD964',
            brandLight: '#E8F9EC',
            brandDark: '#2BA84A',
          }
        }
      }
    }
  </script>
  <style>
    @keyframes breathe {
      0%, 100% { box-shadow: 0 0 0 0 rgba(76,217,100,0.4); }
      50% { box-shadow: 0 0 0 16px rgba(76,217,100,0); }
    }
    .breathe { animation: breathe 2s infinite; }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .fade-in { animation: fadeInUp 0.4s ease-out; }
    @keyframes typing {
      0% { opacity: 0.3; } 50% { opacity: 1; } 100% { opacity: 0.3; }
    }
    .typing-dot { animation: typing 1.2s infinite; }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes pulse-ring {
      0% { transform: scale(0.8); opacity: 1; }
      100% { transform: scale(1.6); opacity: 0; }
    }
    .pulse-ring::before {
      content: '';
      position: absolute;
      inset: -8px;
      border-radius: 50%;
      border: 3px solid #4CD964;
      animation: pulse-ring 1.5s infinite;
    }
    @keyframes recording-wave {
      0%, 100% { height: 8px; }
      50% { height: 24px; }
    }
    .wave-bar { animation: recording-wave 0.8s infinite; }
    .wave-bar:nth-child(2) { animation-delay: 0.15s; }
    .wave-bar:nth-child(3) { animation-delay: 0.3s; }
    .wave-bar:nth-child(4) { animation-delay: 0.15s; }
    .scroll-hide::-webkit-scrollbar { display: none; }
    .scroll-hide { -ms-overflow-style: none; scrollbar-width: none; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif; }
    .large-font .ai-text { font-size: 22px !important; line-height: 1.8 !important; }
    .large-font .btn-large { min-height: 72px !important; font-size: 22px !important; border-radius: 16px !important; }
    .speaker-icon { display: inline-block; animation: breathe 2s infinite; }
  </style>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4" x-data="app()">

  <!-- Phone Frame -->
  <div class="w-[390px] h-[844px] bg-white rounded-[40px] shadow-2xl overflow-hidden relative flex flex-col" :class="{'large-font': currentSkill === 'S02'}">
    
    <!-- Status Bar -->
    <div class="h-12 bg-gradient-to-b from-[#E8F9EC] to-[#F0FAF2] flex items-center justify-between px-6 pt-2 flex-shrink-0">
      <span class="text-sm font-medium text-gray-700">17:38</span>
      <div class="flex gap-1 items-center">
        <span class="text-xs text-gray-500">5G</span>
        <div class="w-6 h-3 border border-gray-400 rounded-sm relative">
          <div class="absolute inset-0.5 bg-green-500 rounded-sm" style="width:70%"></div>
        </div>
      </div>
    </div>

    <!-- Top Bar -->
    <div class="bg-gradient-to-b from-[#F0FAF2] to-[#F5FBF7] px-4 py-2 flex items-center justify-between flex-shrink-0">
      <button @click="goHome()" class="w-8 h-8 rounded-lg bg-white/60 flex items-center justify-center text-gray-500 text-sm">←</button>
      <span class="text-xs text-gray-400 bg-white/60 px-3 py-1 rounded-full" x-text="currentSkill ? skillNames[currentSkill] : '成长守护AI助手'"></span>
      <div class="w-8 h-8 rounded-full bg-white/60 flex items-center justify-center text-xs">•••</div>
    </div>

    <!-- S02 Voice Mode Banner -->
    <div x-show="currentSkill === 'S02'" class="bg-amber-50 border-b border-amber-200 px-4 py-2 flex items-center gap-2 flex-shrink-0 fade-in">
      <span class="text-lg">🔊</span>
      <span class="text-sm text-amber-700 font-medium">语音模式已开启 · AI会自动语音播报</span>
    </div>

    <!-- Chat Area -->
    <div class="flex-1 overflow-y-auto scroll-hide px-4 py-3 space-y-3" id="chatArea" :class="currentSkill === 'S02' ? 'bg-[#FFFDF5]' : 'bg-[#F5FBF7]'">
      
      <!-- Home Screen -->
      <template x-if="screen === 'home'">
        <div class="space-y-3 fade-in">
          <div class="flex items-start gap-2">
            <div class="w-10 h-10 rounded-full bg-gradient-to-br from-green-400 to-green-600 flex items-center justify-center text-white text-lg flex-shrink-0">🤖</div>
            <div class="bg-white rounded-2xl rounded-tl-md px-4 py-3 max-w-[280px] shadow-sm">
              <p class="text-[15px] text-gray-800 leading-relaxed">您好，ninini。需要我帮您查看孩子最近的游戏情况，或者设置游戏时间限制吗？</p>
            </div>
          </div>
          <div class="ml-12 space-y-2">
            <div class="bg-white rounded-2xl px-4 py-3 shadow-sm"><p class="text-[15px] text-gray-700">✨ 孩子最近都在玩哪些游戏？</p></div>
            <div class="bg-white rounded-2xl px-4 py-3 shadow-sm"><p class="text-[15px] text-gray-700">🌿 帮我限制孩子的充值</p></div>
            <div class="bg-white rounded-2xl px-4 py-3 shadow-sm"><p class="text-[15px] text-gray-700">🌱 查看孩子上周的玩游戏情况</p></div>
          </div>
          <!-- Skills Cards -->
          <div class="mt-4">
            <p class="text-xs text-gray-400 ml-1 mb-2">📋 场景化管控方案 · 一键获取适合您的管控建议</p>
            <div class="flex gap-3 overflow-x-auto scroll-hide pb-2 -mx-1 px-1">
              <div @click="enterSkill('S01')" class="flex-shrink-0 w-[88px] bg-white rounded-2xl p-3 shadow-sm cursor-pointer hover:shadow-md transition text-center border border-gray-50">
                <div class="text-3xl mb-1">🔥</div>
                <p class="text-[13px] font-bold text-gray-800">情绪失控</p>

              </div>
              <div class="flex-shrink-0 w-[88px] bg-white rounded-2xl p-3 shadow-sm text-center border border-gray-50">

        </div>
      </template>

      <!-- Chat Messages -->
      <template x-if="screen === 'chat'">
        <div class="space-y-3">
          <template x-for="(msg, index) in messages" :key="index">
            <div class="fade-in">
              <template x-if="msg.role === 'ai'">

                  <div class="w-10 h-10 rounded-full bg-gradient-to-br from-green-400 to-green-600 flex items-center justify-center text-white text-lg flex-shrink-0">🤖</div>
                  <div class="bg-white rounded-2xl rounded-tl-md px-4 py-3 max-w-[280px] shadow-sm">
                    <p class="ai-text text-[15px] text-gray-800 leading-relaxed whitespace-pre-line" x-html="msg.content"></p>
                    <div x-show="currentSkill === 'S02'" class="mt-2 flex items-center gap-1.5 text-xs text-amber-600 bg-amber-50 rounded-full px-2 py-1 w-fit">

              </template>
              <template x-if="msg.role === 'user'">

                    <p class="text-[15px] leading-relaxed" x-html="msg.content"></p>
                  </div>
                </div>
              </template>
              <template x-if="msg.role === 'buttons'">
                <div class="ml-12 space-y-2">
                  <template x-for="(btn, bi) in msg.buttons" :key="bi">
                    <button @click="handleButton(btn)" class="w-full text-left rounded-2xl px-4 py-3 shadow-sm transition font-medium btn-large" :class="btn.type === 'primary' ? 'bg-brand text-white breathe hover:bg-brandDark' : btn.type === 'danger' ? 'bg-red-500 text-white hover:bg-red-600' : 'bg-white text-gray-700 hover:bg-gray-50 border border-gray-100'" x-text="btn.label"></button>
                  </template>
                </div>
              </template>
              <template x-if="msg.role === 'plan'">
                <div class="ml-12 bg-white rounded-2xl px-4 py-4 shadow-sm border border-green-100 space-y-2">
                  <template x-for="(item, pi) in msg.items" :key="pi">
                    <div class="flex items-center gap-2 py-1">
                      <span class="text-xl" x-text="item.icon"></span>
                      <span class="ai-text text-[15px] text-gray-700" x-text="item.text"></span>
                    </div>
                  </template>
                </div>
              </template>
              <template x-if="msg.role === 'success'">
                <div class="ml-12 bg-green-50 rounded-2xl px-4 py-4 shadow-sm border border-green-200 text-center">
                  <div class="text-4xl mb-2">✅</div>
                  <p class="text-[16px] font-bold text-green-700" x-text="msg.content"></p>
                </div>
              </template>
              <template x-if="msg.role === 'typing'">
                <div class="flex items-start gap-2">
                  <div class="w-10 h-10 rounded-full bg-gradient-to-br from-green-400 to-green-600 flex items-center justify-center text-white text-lg flex-shrink-0">🤖</div>
                  <div class="bg-white rounded-2xl rounded-tl-md px-4 py-3 shadow-sm flex gap-1.5">
                    <div class="w-2 h-2 bg-gray-300 rounded-full typing-dot"></div>
                    <div class="w-2 h-2 bg-gray-300 rounded-full typing-dot"></div>
                    <div class="w-2 h-2 bg-gray-300 rounded-full typing-dot"></div>
                  </div>
                </div>
              </template>
              <!-- S02 Report Button (special) -->
              <template x-if="msg.role === 'reportBtn'">
                <div class="ml-12 space-y-2">
                  <button @click="handleButton({action:'s02_report'})" class="w-full rounded-2xl px-6 py-5 shadow-md transition font-bold btn-large bg-brand text-white breathe hover:bg-brandDark text-center" style="min-height:80px;">
                    <div class="text-2xl mb-1">📱</div>
                    <div class="text-xl">上报我这台手机</div>
                    <div class="text-sm opacity-80 mt-1">点这里，管住孩子在这台手机上玩游戏</div>
                  </button>
                </div>
              </template>
              <!-- Notify Card (生成图片) -->
              <template x-if="msg.role === 'notifyCard'">
                <div class="ml-12 my-2">
                  <div class="bg-white rounded-2xl shadow-lg border-2 border-green-200 overflow-hidden" style="max-width:320px;">
                    <div class="bg-gradient-to-r from-green-500 to-green-600 text-white text-center py-3 px-4 font-bold text-lg" x-text="msg.content.title"></div>
                    <div class="px-5 py-4 text-sm leading-relaxed text-gray-700 space-y-0.5">
                      <template x-for="(line, li) in msg.content.lines" :key="li">
                        <p x-text="line" :class="line === '' ? 'h-2' : ''"></p>
                      </template>
                    </div>
                    <div class="border-t border-gray-100 px-4 py-2 flex items-center justify-center gap-1 text-xs text-gray-400">
                      <span>🛡️</span><span>成长守护平台</span>
                    </div>
                  </div>
                  <div class="text-xs text-gray-400 mt-1 ml-1">💡 长按图片可保存到手机</div>
                </div>
              </template>
            </div>
          </template>
        </div>

    <!-- Bottom Input -->
    <div class="bg-white border-t border-gray-100 px-4 py-2 flex-shrink-0">
      <div class="flex gap-2 mb-2 overflow-x-auto scroll-hide" x-show="screen === 'home'">
        <span class="flex-shrink-0 bg-gray-50 text-gray-600 text-xs px-3 py-1.5 rounded-full border border-gray-100">🔧 管控工具</span>
        <span class="flex-shrink-0 bg-brand/10 text-green-700 text-xs px-3 py-1.5 rounded-full border border-green-100">👤 ninini</span>
        <span class="flex-shrink-0 bg-gray-50 text-gray-600 text-xs px-3 py-1.5 rounded-full border border-gray-100">👥 成员情况</span>
      </div>
      <div class="flex items-center gap-2 justify-center">
        <!-- S02: Big Mic Button -->
        <template x-if="currentSkill === 'S02'">
          <div class="flex flex-col items-center gap-1 py-1">
            <button @click="toggleVoiceInput()" class="mic-btn w-20 h-20 rounded-full flex items-center justify-center text-white text-4xl shadow-lg active:scale-95 transition relative" :class="isRecording ? 'bg-red-500' : 'bg-gradient-to-br from-green-400 to-green-600 breathe'">

                <span>🎤</span>
              </template>
              <template x-if="isRecording">
                <div class="flex items-center gap-1">
                  <div class="w-1 bg-white rounded-full wave-bar" style="height:8px"></div>
                  <div class="w-1 bg-white rounded-full wave-bar" style="height:16px"></div>
                  <div class="w-1 bg-white rounded-full wave-bar" style="height:24px"></div>
                  <div class="w-1 bg-white rounded-full wave-bar" style="height:16px"></div>
                  <div class="w-1 bg-white rounded-full wave-bar" style="height:8px"></div>
                </div>
              </template>
              <div x-show="isRecording" class="absolute inset-0 rounded-full" style="border:3px solid #ef4444; animation: pulse-ring 1.5s infinite;"></div>
            </button>
            <span class="text-xs" :class="isRecording ? 'text-red-500 font-bold' : 'text-gray-400'" x-text="isRecording ? '正在听您说话...' : '按一下，开始说话'"></span>
          </div>
        </template>
        <!-- Normal Input -->
        <template x-if="currentSkill !== 'S02'">
          <div class="flex items-center gap-2 w-full">
            <div class="flex-1 flex items-center bg-gray-50 rounded-full px-4 py-2.5 border border-gray-100">

              <span class="text-sm text-gray-400">发消息或按住说话</span>
            </div>
            <button class="w-9 h-9 rounded-full bg-brand flex items-center justify-center text-white flex-shrink-0">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
            </button>
          </div>
        </template>
      </div>
    </div>

    <!-- Bottom Nav -->
    <div class="bg-white border-t border-gray-100 flex items-center justify-around py-2 pb-4 flex-shrink-0">
      <div class="flex flex-col items-center gap-0.5"><span class="text-xl">💬</span><span class="text-[10px] text-gray-400">家庭沟通</span></div>
      <div class="flex flex-col items-center gap-0.5"><span class="text-xl">💭</span><span class="text-[10px] text-gray-400">成长社区</span></div>
      <div class="flex flex-col items-center gap-0.5 relative">
        <div class="w-10 h-10 -mt-3 rounded-full bg-gradient-to-br from-green-400 to-green-500 flex items-center justify-center shadow-md"><span class="text-lg text-white">🎮</span></div>
        <span class="text-[10px] text-green-600 font-medium">游戏管理</span>
      </div>
      <div class="flex flex-col items-center gap-0.5"><span class="text-xl">👤</span><span class="text-[10px] text-gray-400">我的</span></div>
    </div>
  </div>

  <!-- Side Panel -->
  <div class="ml-6 w-[200px] space-y-3 flex-shrink-0">
    <h3 class="text-sm font-bold text-gray-600 mb-2">🎬 演示场景选择</h3>
    <button @click="goHome()" class="w-full text-left px-3 py-2 rounded-xl text-sm transition" :class="!currentSkill ? 'bg-green-100 text-green-800 font-bold' : 'bg-white text-gray-600 hover:bg-gray-50'">🏠 首页（含Skills卡片）</button>
    <div class="text-[10px] text-red-500 font-bold ml-1 mt-2">⭐ 重点演示场景</div>
    <button @click="enterSkill('S01')" class="w-full text-left px-3 py-2 rounded-xl text-sm transition" :class="currentSkill==='S01' ? 'bg-red-100 text-red-800 font-bold' : 'bg-white text-gray-600 hover:bg-gray-50'">🔥 暴躁的妈妈</button>
    <button @click="enterSkill('S02')" class="w-full text-left px-3 py-2 rounded-xl text-sm transition border-2" :class="currentSkill==='S02' ? 'bg-amber-100 text-amber-800 font-bold border-amber-300' : 'bg-white text-gray-600 hover:bg-gray-50 border-amber-200'">👴 不识字的爷爷 <span class="text-[10px]">🔊🎤</span></button>
    <button @click="enterSkill('S06')" class="w-full text-left px-3 py-2 rounded-xl text-sm transition" :class="currentSkill==='S06' ? 'bg-blue-100 text-blue-800 font-bold' : 'bg-white text-gray-600 hover:bg-gray-50'">👨‍👩‍👦 隔代留守</button>
    <hr class="border-gray-200">
    <button @click="enterSkill('S03')" class="w-full text-left px-3 py-2 rounded-xl text-sm bg-white text-gray-600 hover:bg-gray-50">🆕 新手家长</button>
    <button @click="enterSkill('S04')" class="w-full text-left px-3 py-2 rounded-xl text-sm bg-white text-gray-600 hover:bg-gray-50">📅 假期模式</button>
    <div class="text-[10px] text-gray-400 mt-4 leading-relaxed">
      💡 点击场景切换演示<br>
      🔊 S02支持真实语音播报<br>
      🎤 S02支持真实语音输入<br>
      📱 所有按钮可交互
    </div>
  </div>

  <script>
    // TTS
    function speak(text, callback) {
      window.speechSynthesis.cancel();
      const clean = text.replace(/<[^>]*>/g, '').replace(/[📌⏰💰🎮🌙👉✅🔊👋😤😊👍❤️💪👏😄😮‍💨😔😐😟😱]/g, '');
      const u = new SpeechSynthesisUtterance(clean);
      u.lang = 'zh-CN';
      u.rate = 0.85;
      u.pitch = 1.0;
      u.onend = () => { if (callback) callback(); };
      window.speechSynthesis.speak(u);
    }

    // ASR
    let recognition = null;
    function initASR() {
      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SR) return null;
      recognition = new SR();
      recognition.lang = 'zh-CN';
      recognition.continuous = false;
      recognition.interimResults = false;
      return recognition;
    }

    function app() {
      return {
        screen: 'home',
        currentSkill: null,
        messages: [],
        isRecording: false,
        skillNames: {
          'S01': '🔥 情绪失控·冷静管控',
          'S02': '👴 不识字长辈·语音管控',
          'S03': '🆕 新手家长·第一次管控',
          'S04': '📅 假期/开学模式切换',
          'S06': '👨‍👩‍👦 隔代带娃·温和守护'
        },

        goHome() {
          window.speechSynthesis.cancel();
          this.screen = 'home';
          this.currentSkill = null;
          this.messages = [];
          this.isRecording = false;
        },

        async enterSkill(id) {
          window.speechSynthesis.cancel();
          this.currentSkill = id;
          this.screen = 'chat';
          this.messages = [];
          this.isRecording = false;
          await this.delay(300);
          if (id === 'S01') this.flowS01();
          else if (id === 'S02') this.flowS02();
          else if (id === 'S03') this.flowS03();
          else if (id === 'S04') this.flowS04();
          else if (id === 'S06') this.flowS06();
        },

        // ========== S01 ==========
        async flowS01() {
          await this.showTyping();
          this.addAI('我理解您现在很生气 😤\n\n先深呼一口气，我们一起想办法。\n\n直接禁掉所有游戏看起来解气，但经验告诉我们——完全禁止往往让孩子更逆反。\n\n我给您推荐一个<b>「先严后松」</b>的方案——先控制住，观察效果再调整。');

        // Voice Input for S02
        toggleVoiceInput() {
          if (this.isRecording) {
            this.stopRecording();
          } else {
            this.startRecording();
          }
        },

        startRecording() {
          if (!initASR()) {
            // Fallback: simulate voice input
            this.isRecording = true;
            setTimeout(() => {
              this.isRecording = false;
              this.handleVoiceResult('行');
            }, 2000);
            return;
          }
          this.isRecording = true;
          recognition.onresult = (e) => {
            const text = e.results[0][0].transcript;
            this.isRecording = false;
            this.handleVoiceResult(text);
          };
          recognition.onerror = () => {
            this.isRecording = false;
          };
          recognition.onend = () => {
            this.isRecording = false;
          };
          recognition.start();
        },

        stopRecording() {
          this.isRecording = false;
          if (recognition) recognition.stop();
        },

        handleVoiceResult(text) {
          this.addUser('🎤 "' + text + '"');
          const lower = text.toLowerCase();
          if (lower.includes('行') || lower.includes('好') || lower.includes('可以') || lower.includes('就这样')) {
            this.s02_confirm();
          } else if (lower.includes('多') || lower.includes('时间') || lower.includes('长')) {
            this.s02_more();
          } else if (lower.includes('不') || lower.includes('算了')) {
            this.addAI('好的，有需要再来找我。');
            speak('好的，有需要再来找我。');
          } else {
            const reply = '不好意思没听清，您再说一遍？';
            this.addAI(reply);
            speak(reply);
          }
        },

            { icon: '⏰', text: '每天最多1小时' },
            { icon: '🚫', text: '周一到四完全不能玩' },
            { icon: '💰', text: '充值有严格限制' }
          ]);
          this.addAI('建议您做两件事：\n1️⃣ <b>上报您的手机</b>——管住孩子在您手机上玩\n2️⃣ <b>通知爸妈</b>——让他们也知道，远程一起管');
          this.addBtns([
            { label: '✅📱 都要（推荐）', type: 'primary', action: 's06_both' },
            { label: '✅ 先上报手机', type: '', action: 's06_done' },
            { label: '📱 先通知爸妈', type: '', action: 's06_notify' }
          ]);
        },
        async s06_done() {
          this.addUser('上报手机');
          await this.showTyping();
          this.addSuccess('上报成功！系统自动帮您管 👍');
          await this.delay(500);
          this.addAI('几个提示：\n\n1️⃣ <b>到时间自动停</b>——不用您盯着\n\n2️⃣ 孩子不高兴可以说：\n💬 <b>"这是国家规定，爷爷也没办法改。"</b>\n\n3️⃣ 孩子闹别<b>心软</b>——告诉他"问爸妈去"\n\n4️⃣ 建议也<b>开启人脸识别</b>——防孩子冒用您的账号\n\n您辛苦了❤️');
        },
        async s06_notify() {
          this.addUser('通知爸妈');
          await this.showTyping();
          this.addAI('帮您生成了一张<b>通知图片</b> 👇\n\n长按图片可以<b>保存到手机</b>，然后发给孩子的爸爸妈妈看。');
          await this.delay(300);
          // 生成通知图片
          this.messages.push({ role: 'notifyCard', content: {
            title: '📢 游戏管控通知',
            lines: [
              '爷爷/奶奶已为孩子设置了游戏管控：',
              '',
              '🎮 仅周五六日 20:00-21:00 可玩',
              '⏰ 每天最多1小时',
              '📱 已上报手机，防沉迷已生效',
              '',
              '如需调整管控方案，请打开',
              '「成长守护」小程序 → 管控设置',
              '',
              '—— 来自成长守护平台'
            ]
          }});
          this.scrollDown();
          await this.delay(500);
          this.addBtns([
            { label: '💾 保存图片', type: 'primary', action: 's06_saveImg' },
            { label: '📤 直接转发给爸妈', type: '', action: 's06_shareImg' },
          ]);
        },
        async s06_saveImg() {
          this.addUser('保存图片');
          await this.showTyping();
          this.addSuccess('图片已保存到手机相册 📷');
          await this.delay(400);
          this.addAI('图片保存好了！您可以打开<b>微信</b>，把图片发给孩子爸妈。\n\n接下来帮您上报手机？');
          this.addBtns([{ label: '✅ 上报手机', type: 'primary', action: 's06_done' }]);
        },
        async s06_shareImg() {
          this.addUser('转发给爸妈');
          await this.showTyping();
          this.addAI('正在打开微信分享...');
          await this.delay(800);
          this.addSuccess('已打开分享 📤');
          await this.delay(400);
          this.addAI('选好要发给谁就行了！\n\n发完之后，接下来帮您上报手机？');
          this.addBtns([{ label: '✅ 上报手机', type: 'primary', action: 's06_done' }]);
        },
        async s06_both() {
          this.addUser('上报手机+通知爸妈');
          await this.showTyping();
          this.addSuccess('上报成功！系统自动帮您管 👍');
          await this.delay(500);
          this.addAI('手机上报好了！接下来帮您生成一张图片，发给孩子爸妈知道这件事：');
          await this.delay(300);
          this.messages.push({ role: 'notifyCard', content: {
            title: '📢 游戏管控通知',
            lines: [
              '爷爷/奶奶已为孩子设置了游戏管控：',
              '',
              '🎮 仅周五六日 20:00-21:00 可玩',
              '⏰ 每天最多1小时',
              '📱 已上报手机，防沉迷已生效',
              '',
              '如需调整管控方案，请打开',
              '「成长守护」小程序 → 管控设置',
              '',
              '—— 来自成长守护平台'
            ]
          }});
          this.scrollDown();
          await this.delay(500);
          this.addBtns([
            { label: '💾 保存图片', type: 'primary', action: 's06_bothSave' },
            { label: '📤 直接转发给爸妈', type: '', action: 's06_bothShare' },
          ]);
        },
        async s06_bothSave() {
          this.addUser('保存图片');
          await this.showTyping();
          this.addSuccess('图片已保存到手机相册 📷');
          await this.delay(400);
          this.addAI('都搞定了！👍\n\n1️⃣ 手机已上报，防沉迷自动生效\n2️⃣ 图片已保存，发给爸妈就行\n\n孩子不高兴可以说：\n💬 <b>"这是国家规定，爷爷也没办法改。"</b>\n\n您辛苦了❤️');
        },
        async s06_bothShare() {
          this.addUser('转发给爸妈');
          await this.showTyping();
          this.addAI('正在打开微信分享...');
          await this.delay(800);
          this.addSuccess('已打开分享 📤');
          await this.delay(400);
          this.addAI('都搞定了！👍\n\n1️⃣ 手机已上报，防沉迷自动生效\n2️⃣ 分享给爸妈，让他们也知道\n\n孩子不高兴可以说：\n💬 <b>"这是国家规定，爷爷也没办法改。"</b>\n\n您辛苦了❤️');
        },

        // ========== Helpers ==========
        handleButton(btn) { if (this[btn.action]) this[btn.action](); },

        addAI(content) {
          this.messages = this.messages.filter(m => m.role !== 'typing');
          this.messages.push({ role: 'ai', content });
          this.scrollDown();
        },
        addUser(content) {
          this.messages = this.messages.filter(m => m.role !== 'typing' && m.role !== 'buttons' && m.role !== 'reportBtn');
          this.messages.push({ role: 'user', content });
          this.scrollDown();
        },
        addBtns(buttons) {
          this.messages.push({ role: 'buttons', buttons });
          this.scrollDown();
        },
        addPlan(items) {
          this.messages = this.messages.filter(m => m.role !== 'typing');
          this.messages.push({ role: 'plan', items });
          this.scrollDown();
        },
        addSuccess(content) {
          this.messages = this.messages.filter(m => m.role !== 'typing');
          this.messages.push({ role: 'success', content });
          this.scrollDown();
        },
        async showTyping() {
          this.messages.push({ role: 'typing' });
          this.scrollDown();
          await this.delay(700 + Math.random() * 500);
        },
        scrollDown() {
          this.$nextTick(() => {
            const el = document.getElementById('chatArea');
            if (el) el.scrollTop = el.scrollHeight;
          });
        },
        delay(ms) { return new Promise(r => setTimeout(r, ms)); }
      }
    }
  </script>
</body>
</html>
